<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1">
<title>逻辑图形底层组件一览</title>
<style>
:root {
  --lg-bg: #f7f8fb;
  --lg-surface: #ffffff;
  --lg-surface-soft: #f1f5f9;
  --lg-ink: #111827;
  --lg-muted: #64748b;
  --lg-hairline: #d7dee8;
  --lg-line: #8da0b6;
  --lg-primary: #14532d;
  --lg-primary-ink: #f8fafc;
  --lg-accent: #2563eb;
  --lg-accent-soft: #dbeafe;
  --lg-warm: #f59e0b;
  --lg-warm-soft: #fef3c7;
  --lg-danger: #dc2626;
  --lg-danger-soft: #fee2e2;
  --lg-radius-sm: 14px;
  --lg-radius-md: 22px;
  --lg-radius-lg: 32px;
  --lg-radius-pill: 999px;
  --lg-shadow: 0 22px 50px rgba(15, 23, 42, 0.10);
  --lg-shadow-soft: 0 12px 30px rgba(15, 23, 42, 0.08);
  --lg-title-size: 56px;
  --lg-subtitle-size: 26px;
  --lg-node-title-size: 30px;
  --lg-node-body-size: 22px;
  --lg-label-size: 20px;
  --lg-badge-size: 18px;
  --lg-callout-title-size: 24px;
  --lg-callout-body-size: 19px;
  --lg-line-width: 4px;
  --lg-gap: 32px;
  --lg-token-version: "logic-graphics-v1";
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 1920px;
  min-width: 1920px;
  height: 1080px;
  min-height: 1080px;
  overflow: hidden;
  background: #0f172a;
}

.lg-page {
  position: relative;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 250, 252, 0.98)),
    var(--lg-bg);
  color: var(--lg-ink);
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  letter-spacing: 0;
}

.lg-page[data-lg-theme="simpleux-dark"] {
  --lg-bg: #0f172a;
  --lg-surface: #172033;
  --lg-surface-soft: #111827;
  --lg-ink: #f8fafc;
  --lg-muted: #a6b4c8;
  --lg-hairline: #334155;
  --lg-line: #8aa2c6;
  --lg-primary: #86efac;
  --lg-primary-ink: #06230f;
  --lg-accent: #60a5fa;
  --lg-accent-soft: rgba(96, 165, 250, 0.18);
  background:
    linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 1)),
    var(--lg-bg);
}

.lg-header {
  position: absolute;
  left: 120px;
  top: 64px;
  width: 1680px;
  height: 126px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 16px;
}

.lg-title {
  max-width: 1220px;
  font-size: var(--lg-title-size);
  line-height: 1.08;
  font-weight: 760;
  letter-spacing: 0;
  color: var(--lg-ink);
  white-space: normal;
}

.lg-subtitle {
  max-width: 1320px;
  font-size: var(--lg-subtitle-size);
  line-height: 1.42;
  font-weight: 430;
  color: var(--lg-muted);
  white-space: normal;
}

.lg-main {
  position: absolute;
  left: 140px;
  top: 226px;
  width: 1640px;
  height: 734px;
}

.lg-footer {
  position: absolute;
  left: 120px;
  top: 1000px;
  width: 1680px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: var(--lg-muted);
  font-size: 17px;
  line-height: 1;
}

.lg-footer::before {
  content: "";
  width: 88px;
  height: 4px;
  border-radius: var(--lg-radius-pill);
  background: var(--lg-primary);
}

.lg-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.lg-connector-layer {
  z-index: 2;
  overflow: visible;
}

.lg-group-layer {
  z-index: 1;
}

.lg-node-layer,
.lg-callout-layer,
.lg-label-layer,
.lg-badge-layer {
  z-index: 3;
}

.lg-group {
  position: absolute;
  border: 1.5px solid rgba(141, 160, 182, 0.36);
  border-radius: var(--lg-radius-lg);
  background: rgba(255, 255, 255, 0.55);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
}

.lg-page[data-lg-theme="simpleux-dark"] .lg-group {
  background: rgba(255, 255, 255, 0.045);
  border-color: rgba(148, 163, 184, 0.34);
}

.lg-group-title {
  position: absolute;
  left: 28px;
  top: 20px;
  color: var(--lg-muted);
  font-size: var(--lg-label-size);
  font-weight: 650;
  line-height: 1;
}

.lg-node {
  position: absolute;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 12px;
  padding: 28px 30px;
  border: 2px solid var(--lg-hairline);
  background: var(--lg-surface);
  color: var(--lg-ink);
  box-shadow: var(--lg-shadow-soft);
  text-align: center;
  overflow: hidden;
}

.lg-node[data-lg-emphasis="true"] {
  border-color: color-mix(in srgb, var(--lg-primary) 72%, var(--lg-hairline));
  background: var(--lg-primary);
  color: var(--lg-primary-ink);
  box-shadow: var(--lg-shadow);
}

.lg-node--rect {
  border-radius: var(--lg-radius-md);
}

.lg-node--pill {
  border-radius: var(--lg-radius-pill);
}

.lg-node--circle {
  border-radius: 50%;
  padding: 34px;
}

.lg-node--diamond {
  border: 0;
  background: transparent;
  box-shadow: none;
  padding: 34px 42px;
}

.lg-node--diamond::before {
  content: "";
  position: absolute;
  inset: 10px 22px;
  z-index: -1;
  border: 2px solid var(--lg-hairline);
  border-radius: var(--lg-radius-sm);
  background: var(--lg-surface);
  transform: rotate(45deg);
  box-shadow: var(--lg-shadow-soft);
}

.lg-node--diamond[data-lg-emphasis="true"]::before {
  border-color: var(--lg-primary);
  background: var(--lg-primary);
}

.lg-node--index {
  align-items: flex-start;
  text-align: left;
  border-radius: var(--lg-radius-md);
  padding-left: 78px;
}

.lg-node-index {
  position: absolute;
  left: 26px;
  top: 28px;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: var(--lg-accent-soft);
  color: var(--lg-accent);
  font-size: 18px;
  font-weight: 760;
}

.lg-node-title {
  font-size: var(--lg-node-title-size);
  line-height: 1.14;
  font-weight: 760;
  overflow-wrap: anywhere;
}

.lg-node-body {
  font-size: var(--lg-node-body-size);
  line-height: 1.38;
  font-weight: 420;
  color: color-mix(in srgb, currentColor 78%, transparent);
  overflow-wrap: anywhere;
}

.lg-badge {
  position: absolute;
  z-index: 4;
  min-width: 72px;
  max-width: 150px;
  min-height: 34px;
  padding: 8px 15px;
  border-radius: var(--lg-radius-pill);
  background: var(--lg-accent-soft);
  color: var(--lg-accent);
  border: 1px solid color-mix(in srgb, var(--lg-accent) 30%, transparent);
  font-size: var(--lg-badge-size);
  line-height: 1;
  font-weight: 720;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.lg-badge[data-lg-tone="warm"] {
  background: var(--lg-warm-soft);
  color: #92400e;
  border-color: color-mix(in srgb, var(--lg-warm) 35%, transparent);
}

.lg-badge[data-lg-tone="danger"] {
  background: var(--lg-danger-soft);
  color: var(--lg-danger);
  border-color: color-mix(in srgb, var(--lg-danger) 30%, transparent);
}

.lg-callout {
  position: absolute;
  z-index: 4;
  padding: 22px 24px;
  border-radius: var(--lg-radius-md);
  border: 1.5px solid rgba(141, 160, 182, 0.42);
  background: color-mix(in srgb, var(--lg-surface) 92%, transparent);
  box-shadow: var(--lg-shadow-soft);
}

.lg-callout-title {
  margin-bottom: 9px;
  color: var(--lg-ink);
  font-size: var(--lg-callout-title-size);
  line-height: 1.18;
  font-weight: 760;
  overflow-wrap: anywhere;
}

.lg-callout-body {
  color: var(--lg-muted);
  font-size: var(--lg-callout-body-size);
  line-height: 1.42;
  font-weight: 430;
  overflow-wrap: anywhere;
}

.lg-label,
.lg-connector-label {
  position: absolute;
  z-index: 4;
  min-height: 34px;
  padding: 8px 14px;
  border-radius: var(--lg-radius-pill);
  background: color-mix(in srgb, var(--lg-surface) 86%, transparent);
  color: var(--lg-muted);
  border: 1px solid rgba(141, 160, 182, 0.32);
  font-size: var(--lg-label-size);
  line-height: 1;
  font-weight: 650;
  white-space: nowrap;
  box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
}

.lg-connector-path {
  fill: none;
  stroke: var(--lg-line);
  stroke-width: var(--lg-line-width);
  stroke-linecap: round;
  stroke-linejoin: round;
}

.lg-connector-path[data-lg-dashed="true"] {
  stroke-dasharray: 12 12;
}

.lg-connector-hitbox {
  fill: none;
  stroke: transparent;
  stroke-width: 18px;
}

</style>
</head>
<body>
<main class="lg-page" data-logic-graphic="true" data-lg-component="GraphicFrame" data-lg-token-version="logic-graphics-v1" data-lg-theme="simpleux-light" style="width:1920px;height:1080px;">
<header class="lg-header" data-lg-zone="header">
<div class="lg-title" data-lg-text-role="canvas-title" data-lg-max-chars="30">逻辑图形底层组件一览</div>
<div class="lg-subtitle" data-lg-text-role="canvas-subtitle" data-lg-max-chars="40">此页用于确认节点、分组、连接线、徽标和旁注都能被稳定渲染。</div>
</header>
<section class="lg-main" data-lg-zone="main" data-lg-layout="modules">
<div class="lg-layer lg-group-layer"><div class="lg-group" data-lg-component="GraphicGroup" data-lg-group-id="节点" style="left:0px;top:0px;width:525px;height:734px;"><div class="lg-group-title">GraphicNode</div></div><div class="lg-group" data-lg-component="GraphicGroup" data-lg-group-id="关系" style="left:557px;top:0px;width:525px;height:734px;"><div class="lg-group-title">GraphicConnector</div></div><div class="lg-group" data-lg-component="GraphicGroup" data-lg-group-id="辅助" style="left:1115px;top:0px;width:525px;height:734px;"><div class="lg-group-title">Label · Badge · Callout</div></div></div>
<svg class="lg-layer lg-connector-layer" data-lg-component="GraphicConnectorLayer" viewBox="0 0 1640 734" width="1640" height="734" aria-hidden="true">
<defs><marker id="lg-arrow" viewBox="0 0 16 16" refX="13" refY="8" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M 2 2 L 14 8 L 2 14 z" fill="var(--lg-line)"></path></marker></defs>
<path class="lg-connector-path" data-lg-component="GraphicConnector" data-lg-connector="c1" data-lg-from="circle" data-lg-to="pill" data-lg-kind="arrow" data-lg-dashed="false" data-lg-points="[{&quot;x&quot;:499,&quot;y&quot;:134},{&quot;x&quot;:583,&quot;y&quot;:134}]" d="M 499 134.41023339317775 L 583 134.41023339317775" marker-end="url(#lg-arrow)"></path><path class="lg-connector-path" data-lg-component="GraphicConnector" data-lg-connector="c2" data-lg-from="diamond" data-lg-to="index" data-lg-kind="elbow" data-lg-dashed="false" data-lg-points="[{&quot;x&quot;:499,&quot;y&quot;:286},{&quot;x&quot;:541,&quot;y&quot;:286},{&quot;x&quot;:541,&quot;y&quot;:286},{&quot;x&quot;:583,&quot;y&quot;:286}]" d="M 499 286.41023339317775 L 541 286.41023339317775 L 541 286.41023339317775 L 583 286.41023339317775" marker-end="url(#lg-arrow)"></path><path class="lg-connector-path" data-lg-component="GraphicConnector" data-lg-connector="c3" data-lg-from="pill" data-lg-to="badgeNode" data-lg-kind="curve" data-lg-dashed="false" data-lg-points="[{&quot;x&quot;:1056,&quot;y&quot;:196},{&quot;x&quot;:1066,&quot;y&quot;:197},{&quot;x&quot;:1076,&quot;y&quot;:199},{&quot;x&quot;:1084,&quot;y&quot;:202},{&quot;x&quot;:1091,&quot;y&quot;:206},{&quot;x&quot;:1099,&quot;y&quot;:210},{&quot;x&quot;:1106,&quot;y&quot;:214},{&quot;x&quot;:1113,&quot;y&quot;:218},{&quot;x&quot;:1121,&quot;y&quot;:221},{&quot;x&quot;:1131,&quot;y&quot;:223},{&quot;x&quot;:1141,&quot;y&quot;:224}]" d="M 1056 196.2437275985663 C 1093.4 196.2437275985663, 1103.6 223.7562724014337, 1141 223.7562724014337" marker-end="url(#lg-arrow)"></path>
</svg>
<div class="lg-layer lg-node-layer"><div class="lg-node lg-node--circle" data-lg-component="GraphicNode" data-lg-node-id="circle" data-lg-kind="circle" data-lg-level="secondary" data-lg-emphasis="false" data-lg-title-length="4" data-lg-body-length="5" style="left:34px;top:68px;width:457px;height:132px;">  <div class="lg-node-title" data-lg-text-role="node-title" data-lg-max-chars="18">圆形节点</div> <div class="lg-node-body" data-lg-text-role="node-body" data-lg-max-chars="48">中心或要素</div> </div><div class="lg-node lg-node--diamond" data-lg-component="GraphicNode" data-lg-node-id="diamond" data-lg-kind="diamond" data-lg-level="secondary" data-lg-emphasis="false" data-lg-title-length="4" data-lg-body-length="5" style="left:34px;top:220px;width:457px;height:132px;">  <div class="lg-node-title" data-lg-text-role="node-title" data-lg-max-chars="18">判断节点</div> <div class="lg-node-body" data-lg-text-role="node-body" data-lg-max-chars="48">分叉或条件</div> </div><div class="lg-node lg-node--pill" data-lg-component="GraphicNode" data-lg-node-id="pill" data-lg-kind="pill" data-lg-level="primary" data-lg-emphasis="true" data-lg-title-length="4" data-lg-body-length="4" style="left:591px;top:68px;width:457px;height:132px;">  <div class="lg-node-title" data-lg-text-role="node-title" data-lg-max-chars="18">胶囊节点</div> <div class="lg-node-body" data-lg-text-role="node-body" data-lg-max-chars="48">阶段标签</div> </div><div class="lg-node lg-node--index" data-lg-component="GraphicNode" data-lg-node-id="index" data-lg-kind="index" data-lg-level="secondary" data-lg-emphasis="false" data-lg-title-length="4" data-lg-body-length="4" style="left:591px;top:220px;width:457px;height:132px;"> <div class="lg-node-index">4</div> <div class="lg-node-title" data-lg-text-role="node-title" data-lg-max-chars="18">编号节点</div> <div class="lg-node-body" data-lg-text-role="node-body" data-lg-max-chars="48">步骤排序</div> </div><div class="lg-node lg-node--rect" data-lg-component="GraphicNode" data-lg-node-id="calloutNode" data-lg-kind="rect" data-lg-level="secondary" data-lg-emphasis="false" data-lg-title-length="4" data-lg-body-length="6" style="left:1149px;top:68px;width:457px;height:132px;">  <div class="lg-node-title" data-lg-text-role="node-title" data-lg-max-chars="18">旁注目标</div> <div class="lg-node-body" data-lg-text-role="node-body" data-lg-max-chars="48">用于解释重点</div> </div><div class="lg-node lg-node--rect" data-lg-component="GraphicNode" data-lg-node-id="badgeNode" data-lg-kind="rect" data-lg-level="secondary" data-lg-emphasis="false" data-lg-title-length="4" data-lg-body-length="4" style="left:1149px;top:220px;width:457px;height:132px;">  <div class="lg-node-title" data-lg-text-role="node-title" data-lg-max-chars="18">状态徽标</div> <div class="lg-node-body" data-lg-text-role="node-body" data-lg-max-chars="48">短词高亮</div> </div></div>
<div class="lg-layer lg-label-layer"><div class="lg-connector-label" data-lg-component="GraphicLabel" data-lg-text-role="connector-label" data-lg-max-chars="12" style="left:500px;top:117px;width:82px;">箭头</div><div class="lg-connector-label" data-lg-component="GraphicLabel" data-lg-text-role="connector-label" data-lg-max-chars="12" style="left:500px;top:269px;width:82px;">折线</div><div class="lg-connector-label" data-lg-component="GraphicLabel" data-lg-text-role="connector-label" data-lg-max-chars="12" style="left:1054px;top:191px;width:82px;">曲线</div></div>
<div class="lg-layer lg-badge-layer"><div class="lg-badge" data-lg-component="GraphicBadge" data-lg-tone="default" data-lg-text-role="badge" data-lg-max-chars="8" style="left:996px;top:50px;width:72px;height:34px;">示例</div><div class="lg-badge" data-lg-component="GraphicBadge" data-lg-tone="default" data-lg-text-role="badge" data-lg-max-chars="8" style="left:1554px;top:202px;width:72px;height:34px;">状态</div></div>
<div class="lg-layer lg-callout-layer"><aside class="lg-callout" data-lg-component="GraphicCallout" data-lg-target="calloutNode" style="left:775px;top:73px;width:330px;height:122px;"><div class="lg-callout-title" data-lg-text-role="callout-title" data-lg-max-chars="14">旁注组件</div><div class="lg-callout-body" data-lg-text-role="callout-body" data-lg-max-chars="56">只承载短解释，不替代正文段落。</div></aside></div>
</section>
<footer class="lg-footer" data-lg-zone="footer"><span>SimpleUX Logic Graphics · components</span></footer>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1">
<title>Template Motif</title>
<link rel="stylesheet" href="../template-motifs.css">
</head>
<body>
<main class="tm-page" data-logic-graphic="true" data-lg-component="GraphicFrame" data-lg-token-version="logic-graphics-v1" data-template-motif="triangle-cycle">
<header class="tm-caption" data-lg-zone="header"></header>
<section class="tm-main" data-lg-zone="main">

<div class="tm-triangle-cycle" data-template-style="takram" style="--tm-cycle-accent:#2fbf73;--tm-cycle-accent-dark:#16a34a;--tm-cycle-accent-soft:#e9f5ee;--tm-cycle-ink:#1f2a24;--tm-cycle-muted:#7a8b81;--tm-cycle-ring:#cad7cf;--tm-cycle-card:#ffffff;--tm-cycle-card-border:rgba(148, 163, 184, 0.20);--tm-cycle-shadow:0 14px 34px rgba(31, 42, 36, 0.10);--tm-cycle-radius:8px;--tm-focus-left:#2fbf73;--tm-focus-right:#1f2c3b;--tm-focus-cone-left:#e9f5ee;--tm-focus-cone-right:#edf0f2;--tm-focus-ink:#1f2a24;--tm-focus-muted:#6b7280;--tm-focus-axis:#cfd2d6;--tm-network-primary:#2fbf73;--tm-network-dark:#1f2c3b;--tm-network-line:#cad7cf;--tm-network-ink:#1f2a24;--tm-network-glow:rgba(36, 194, 83, 0.26);--tm-ribbon-primary:#2fbf73;--tm-ribbon-dark:#1f2c3b;--tm-ribbon-soft:#e9f5ee;--tm-ribbon-line:#cad7cf;--tm-ribbon-ink:#1f2a24;--tm-ribbon-muted:#7a8b81;--tm-ribbon-shadow:0 14px 34px rgba(31, 42, 36, 0.10);--tm-triad-primary:#2fbf73;--tm-triad-dark:#1f2c3b;--tm-triad-soft:#e9f5ee;--tm-triad-line:#cad7cf;--tm-triad-ink:#1f2a24;--tm-layered-primary:#2fbf73;--tm-layered-dark:#1f2c3b;--tm-layered-soft:#e9f5ee;--tm-layered-line:#cad7cf;--tm-layered-ink:#1f2a24;--tm-layered-muted:#7a8b81;--tm-bilateral-primary:#2fbf73;--tm-bilateral-dark:#1f2c3b;--tm-bilateral-soft:#e9f5ee;--tm-bilateral-line:#cad7cf;--tm-bilateral-ink:#1f2a24;--tm-bilateral-muted:#7a8b81;">
<svg class="tm-canvas" viewBox="0 0 1920 1080" aria-hidden="true">
  <defs>
    <marker id="tm-cycle-arrow" viewBox="0 0 28 28" refX="19" refY="14" markerWidth="30" markerHeight="30" markerUnits="userSpaceOnUse" orient="auto-start-reverse">
      <path d="M 6 5 L 22 14 L 6 23 Z" fill="var(--tm-cycle-accent)"></path>
    </marker>
  </defs>
  <circle class="tm-triangle-cycle-ring" cx="960" cy="560" r="486"></circle>
  <path class="tm-triangle-cycle-back" d="M 960 218 L 618 812 L 1302 812 Z"></path>
  <path class="tm-triangle-cycle-band" data-lg-component="GraphicGroup" d="M 960 300 L 960 300 L 1041.6964285714287 445.33333333333337 L 878.3035714285714 445.33333333333337 Z" fill="var(--tm-cycle-accent)" opacity="1"></path><path class="tm-triangle-cycle-band" data-lg-component="GraphicGroup" d="M 873.6964285714286 453.33333333333337 L 1046.3035714285716 453.33333333333337 L 1127.6964285714287 594.6666666666667 L 792.3035714285713 594.6666666666667 Z" fill="var(--tm-cycle-accent)" opacity="1"></path><path class="tm-triangle-cycle-band" data-lg-component="GraphicGroup" d="M 787.6964285714286 602.6666666666667 L 1132.3035714285716 602.6666666666667 L 1216 748 L 704 748 Z" fill="var(--tm-cycle-accent)" opacity="1"></path>
  <path class="tm-triangle-cycle-separator" d="M 874 449.33333333333337 L 1046 449.33333333333337 L 1046.575892857143 450.33333333333337 L 873.4241071428571 450.33333333333337 Z"></path><path class="tm-triangle-cycle-separator" d="M 788 598.6666666666667 L 1132 598.6666666666667 L 1132.575892857143 599.6666666666667 L 787.4241071428571 599.6666666666667 Z"></path>
  <path class="tm-triangle-cycle-arrow" data-lg-component="GraphicConnector" data-lg-from="cycle-top" data-lg-to="cycle-left" data-lg-points='[{"x":848,"y":282},{"x":642,"y":654}]' d="M 848 282 L 642 654"></path>
  <path class="tm-triangle-cycle-arrow" data-lg-component="GraphicConnector" data-lg-from="cycle-top" data-lg-to="cycle-right" data-lg-points='[{"x":1072,"y":282},{"x":1278,"y":654}]' d="M 1072 282 L 1278 654"></path>
  <circle class="tm-triangle-cycle-anchor" data-anchor-slot="left" cx="628" cy="427" r="13"></circle>
  <circle class="tm-triangle-cycle-anchor" data-anchor-slot="right" cx="1292" cy="427" r="13"></circle>
  <circle class="tm-triangle-cycle-anchor" data-anchor-slot="bottom" cx="960" cy="818" r="13"></circle>
</svg>
<div class="tm-triangle-cycle-title top" data-lg-component="GraphicLabel" data-lg-text-role="顶部标签" data-lg-max-chars="10">设计功能</div>
<ul class="tm-triangle-cycle-bullets" data-lg-component="GraphicLabel" data-lg-text-role="顶部要点" data-lg-max-chars="90">
        <li>建立共同目标与评价标准</li><li>把行动、反馈、优化合成闭环</li>
      </ul>
<div class="tm-triangle-cycle-title left" data-lg-component="GraphicLabel" data-lg-text-role="左侧标签" data-lg-max-chars="10">设计功能</div>
<div class="tm-triangle-cycle-title right" data-lg-component="GraphicLabel" data-lg-text-role="右侧标签" data-lg-max-chars="10">设计功能</div>
<div class="tm-triangle-cycle-level" data-lg-component="GraphicLabel" data-lg-text-role="三角分层标题" data-lg-max-chars="14" style="left:810px;top:351px;">洞察层</div><div class="tm-triangle-cycle-level" data-lg-component="GraphicLabel" data-lg-text-role="三角分层标题" data-lg-max-chars="14" style="left:810px;top:500px;">转化层</div><div class="tm-triangle-cycle-level" data-lg-component="GraphicLabel" data-lg-text-role="三角分层标题" data-lg-max-chars="14" style="left:810px;top:649px;">协同层</div><article class="tm-triangle-cycle-card left" data-lg-component="GraphicCallout" data-lg-callout-slot="left" style="left:236px;top:328px;width:330px;min-height:198px;">
      <strong data-lg-text-role="说明卡标题" data-lg-max-chars="12">输入侧</strong>
      <div class="tm-triangle-cycle-card-text"><div>识别关键对象</div><div>沉淀约束条件</div><div>统一判断口径</div></div>
    </article><article class="tm-triangle-cycle-card right" data-lg-component="GraphicCallout" data-lg-callout-slot="right" style="left:1354px;top:328px;width:330px;min-height:198px;">
      <strong data-lg-text-role="说明卡标题" data-lg-max-chars="12">输出侧</strong>
      <div class="tm-triangle-cycle-card-text"><div>形成可执行方案</div><div>同步角色责任</div><div>推动结果落地</div></div>
    </article><article class="tm-triangle-cycle-card bottom" data-lg-component="GraphicCallout" data-lg-callout-slot="bottom" style="left:795px;top:842px;width:330px;min-height:150px;">
      <strong data-lg-text-role="说明卡标题" data-lg-max-chars="12">反馈侧</strong>
      <div class="tm-triangle-cycle-card-text"><div>复盘偏差</div><div>刷新策略</div></div>
    </article>
</div>
</section>
<footer class="tm-footer" data-lg-zone="footer"></footer>
</main>
</body>
</html>

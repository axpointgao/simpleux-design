<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1">
<title>Template Motif</title>
<link rel="stylesheet" href="../template-motifs.css">
</head>
<body>
<main class="tm-page" data-logic-graphic="true" data-lg-component="GraphicFrame" data-lg-token-version="logic-graphics-v1" data-template-motif="ribbon-stage-pipeline">
<header class="tm-caption" data-lg-zone="header"></header>
<section class="tm-main" data-lg-zone="main">

<div class="tm-ribbon-pipeline" data-template-style="takram" style="--tm-cycle-accent:#2fbf73;--tm-cycle-accent-dark:#16a34a;--tm-cycle-accent-soft:#e9f5ee;--tm-cycle-ink:#1f2a24;--tm-cycle-muted:#7a8b81;--tm-cycle-ring:#cad7cf;--tm-cycle-card:#ffffff;--tm-cycle-card-border:rgba(148, 163, 184, 0.20);--tm-cycle-shadow:0 14px 34px rgba(31, 42, 36, 0.10);--tm-cycle-radius:8px;--tm-focus-left:#2fbf73;--tm-focus-right:#1f2c3b;--tm-focus-cone-left:#e9f5ee;--tm-focus-cone-right:#edf0f2;--tm-focus-ink:#1f2a24;--tm-focus-muted:#6b7280;--tm-focus-axis:#cfd2d6;--tm-network-primary:#2fbf73;--tm-network-dark:#1f2c3b;--tm-network-line:#cad7cf;--tm-network-ink:#1f2a24;--tm-network-glow:rgba(36, 194, 83, 0.26);--tm-ribbon-primary:#2fbf73;--tm-ribbon-dark:#1f2c3b;--tm-ribbon-soft:#e9f5ee;--tm-ribbon-line:#cad7cf;--tm-ribbon-ink:#1f2a24;--tm-ribbon-muted:#7a8b81;--tm-ribbon-shadow:0 14px 34px rgba(31, 42, 36, 0.10);--tm-triad-primary:#2fbf73;--tm-triad-dark:#1f2c3b;--tm-triad-soft:#e9f5ee;--tm-triad-line:#cad7cf;--tm-triad-ink:#1f2a24;--tm-layered-primary:#2fbf73;--tm-layered-dark:#1f2c3b;--tm-layered-soft:#e9f5ee;--tm-layered-line:#cad7cf;--tm-layered-ink:#1f2a24;--tm-layered-muted:#7a8b81;--tm-bilateral-primary:#2fbf73;--tm-bilateral-dark:#1f2c3b;--tm-bilateral-soft:#e9f5ee;--tm-bilateral-line:#cad7cf;--tm-bilateral-ink:#1f2a24;--tm-bilateral-muted:#7a8b81;">
<svg class="tm-canvas" viewBox="0 0 1920 1080" aria-hidden="true">
  <defs>
    <linearGradient id="tm-ribbon-band-fill" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="var(--tm-ribbon-soft)" stop-opacity="0.76"></stop>
      <stop offset="70%" stop-color="var(--tm-ribbon-soft)" stop-opacity="0.62"></stop>
      <stop offset="100%" stop-color="var(--tm-ribbon-soft)" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="tm-ribbon-arrow-fill" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="var(--tm-ribbon-primary)" stop-opacity="0.18"></stop>
      <stop offset="42%" stop-color="var(--tm-ribbon-primary)" stop-opacity="0.72"></stop>
      <stop offset="100%" stop-color="var(--tm-ribbon-primary)" stop-opacity="1"></stop>
    </linearGradient>
  </defs>
  <path class="tm-ribbon-band" d="M 304 486 L 1354 -30 L 1920 -30 L 1920 1110 L 1336 1110 L 304 642 Z"></path>
  <circle class="tm-ribbon-end-ring start" cx="214" cy="560" r="184"></circle>
  <circle class="tm-ribbon-end-ring end" cx="1712" cy="560" r="184"></circle>
  <path class="tm-ribbon-stage-arc one top" d="M 672 270 C 710 352 734 443 744 523"></path>
  <path class="tm-ribbon-stage-arc one bottom" d="M 744 597 C 732 684 704 774 666 845"></path>
  <path class="tm-ribbon-stage-arc two top" d="M 1084 90 C 1144 226 1190 384 1208 523"></path>
  <path class="tm-ribbon-stage-arc two bottom" d="M 1208 597 C 1190 738 1144 895 1084 1030"></path>
  <path class="tm-ribbon-flow" d="M 920 514 L 980 560 L 920 606 Z"></path>
  <path class="tm-ribbon-flow" d="M 1398 514 L 1458 560 L 1398 606 Z"></path>
</svg>
<div class="tm-ribbon-endpoint start" data-lg-component="GraphicNode" data-lg-node-id="start">
  <span data-lg-text-role="起点标题" data-lg-max-chars="10">榜单
基建</span>
</div>
<div class="tm-ribbon-endpoint end" data-lg-component="GraphicNode" data-lg-node-id="end">
  <span data-lg-text-role="终点标题" data-lg-max-chars="10">榜单
基建</span>
</div>
<article class="tm-ribbon-stage" data-lg-component="GraphicGroup" style="left:545px;top:360px;">
    <div class="tm-ribbon-stage-dot" data-lg-component="GraphicNode" data-lg-node-id="stage-1">
      <span data-lg-text-role="阶段标题" data-lg-max-chars="10">视觉符号</span>
      <div class="tm-ribbon-stage-copy" data-lg-component="GraphicLabel" data-lg-text-role="阶段说明" data-lg-max-chars="42">
        <span>这里是文字</span><span>这里是文字</span>
      </div>
    </div>
  </article><article class="tm-ribbon-stage" data-lg-component="GraphicGroup" style="left:1015px;top:360px;">
    <div class="tm-ribbon-stage-dot" data-lg-component="GraphicNode" data-lg-node-id="stage-2">
      <span data-lg-text-role="阶段标题" data-lg-max-chars="10">视觉符号</span>
      <div class="tm-ribbon-stage-copy" data-lg-component="GraphicLabel" data-lg-text-role="阶段说明" data-lg-max-chars="42">
        <span>这里是文字</span><span>这里是文字</span>
      </div>
    </div>
  </article>
<div class="tm-ribbon-badge start" data-lg-component="GraphicBadge" style="left:180px;top:310px;"><span data-lg-text-role="阶段辅助标签" data-lg-max-chars="8">用户
调研</span></div><div class="tm-ribbon-badge start" data-lg-component="GraphicBadge" style="left:326px;top:485px;"><span data-lg-text-role="阶段辅助标签" data-lg-max-chars="8">用户
调研</span></div><div class="tm-ribbon-badge start" data-lg-component="GraphicBadge" style="left:180px;top:690px;"><span data-lg-text-role="阶段辅助标签" data-lg-max-chars="8">用户
调研</span></div>
<div class="tm-ribbon-badge end" data-lg-component="GraphicBadge" style="left:1452px;top:365px;"><span data-lg-text-role="阶段辅助标签" data-lg-max-chars="8">用户
调研</span></div><div class="tm-ribbon-badge end" data-lg-component="GraphicBadge" style="left:1452px;top:645px;"><span data-lg-text-role="阶段辅助标签" data-lg-max-chars="8">用户

</div>
</section>
<footer class="tm-footer" data-lg-zone="footer"></footer>
</main>

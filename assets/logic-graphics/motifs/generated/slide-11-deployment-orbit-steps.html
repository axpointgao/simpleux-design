<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1">
<title>Template Motif</title>
<link rel="stylesheet" href="../template-motifs.css">
</head>

<svg class="tm-canvas" viewBox="0 0 1920 1080" aria-hidden="true">
  <circle class="tm-deploy-dome" cx="960" cy="1080" r="820"></circle>
  <path class="tm-deploy-outer-track" d="M 340 1080 A 620 620 0 0 1 1580 1080"></path>
  <path class="tm-deploy-inner-track" d="M 530 1080 A 430 430 0 0 1 1390 1080"></path>

  <span data-lg-text-role="中心说明" data-lg-max-chars="12">关键文本信息替换</span>
</div>
<div class="tm-deploy-step-node" data-lg-component="GraphicNode" data-lg-node-id="deploy-step-1" style="left:314px;top:873px;">

    </div>
  </article>
<div class="tm-deploy-arc-label" data-lg-component="GraphicLabel" data-lg-text-role="步骤关系标签" data-lg-max-chars="16" style="left:492px;top:868px;">
    <strong>集成</strong>
    <span>系统接口开发</span>
  </div><div class="tm-deploy-arc-label" data-lg-component="GraphicLabel" data-lg-text-role="步骤关系标签" data-lg-max-chars="16" style="left:617px;top:711px;">
    <strong>测试</strong>
    <span>数据资源打通</span>
  </div><div class="tm-deploy-arc-label" data-lg-component="GraphicLabel" data-lg-text-role="步骤关系标签" data-lg-max-chars="16" style="left:778px;top:633px;">

    <span>模型配置调试</span>
  </div><div class="tm-deploy-arc-label" data-lg-component="GraphicLabel" data-lg-text-role="步骤关系标签" data-lg-max-chars="16" style="left:986px;top:633px;">
    <strong>培训</strong>
    <span>多场景联调测</span>
  </div><div class="tm-deploy-arc-label" data-lg-component="GraphicLabel" data-lg-text-role="步骤关系标签" data-lg-max-chars="16" style="left:1147px;top:711px;">

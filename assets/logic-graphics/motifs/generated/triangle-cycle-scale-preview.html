<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Triangle Cycle Scale Preview</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 32px;
    background: #eef2f7;
    color: #111827;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  h1 {
    margin: 0 0 8px;
    font-size: 28px;
  }

  p {
    margin: 0 0 24px;
    color: #64748b;
    font-size: 15px;
  }

  .grid {
    display: grid;
    gap: 24px;
  }

  .case {
    padding: 16px;
    border: 1px solid #d7dee8;
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
  }

  .case strong {
    display: block;
    margin-bottom: 12px;
    font-size: 14px;
  }

  .viewport {
    position: relative;
    overflow: hidden;
    background: #fff;
  }

  iframe {
    position: absolute;
    left: 0;
    top: 0;
    width: 1920px;
    height: 1080px;
    border: 0;
    transform-origin: 0 0;
    pointer-events: none;
  }

  .scale-70 iframe {
    transform: scale(0.70);
  }

  .scale-70 .viewport {
    width: 1344px;
    height: 756px;
  }

  .scale-50 iframe {
    transform: scale(0.50);
  }

  .scale-50 .viewport {
    width: 960px;
    height: 540px;
  }

  .scale-35 iframe {
    transform: scale(0.35);
  }

  .scale-35 .viewport {
    width: 672px;
    height: 378px;
  }
</style>
</head>
<body>
<h1>三角循环缩放预览</h1>
<p>模拟 PPT 中将 1920×1080 图形作为整体等比缩放嵌入时的表现。</p>
<div class="grid">
  <section class="case scale-70">
    <strong>70% 缩放</strong>
    <div class="viewport"><iframe src="slide-04-triangle-cycle.html" title="70%"></iframe></div>
  </section>
  <section class="case scale-50">
    <strong>50% 缩放</strong>
    <div class="viewport"><iframe src="slide-04-triangle-cycle.html" title="50%"></iframe></div>
  </section>
  <section class="case scale-35">
    <strong>35% 缩放</strong>
    <div class="viewport"><iframe src="slide-04-triangle-cycle.html" title="35%"></iframe></div>
  </section>
</div>
</body>
</html>

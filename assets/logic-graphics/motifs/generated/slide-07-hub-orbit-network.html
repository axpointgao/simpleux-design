<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1">
<title>Template Motif</title>
<link rel="stylesheet" href="../template-motifs.css">
</head>
<body>
<main class="tm-page" data-logic-graphic="true" data-lg-component="GraphicFrame" data-lg-token-version="logic-graphics-v1" data-template-motif="hub-orbit-network">
<header class="tm-caption" data-lg-zone="header"></header>
<section class="tm-main" data-lg-zone="main">

<div class="tm-hub-network" data-template-style="takram" style="--tm-cycle-accent:#2fbf73;--tm-cycle-accent-dark:#16a34a;--tm-cycle-accent-soft:#e9f5ee;--tm-cycle-ink:#1f2a24;--tm-cycle-muted:#7a8b81;--tm-cycle-ring:#cad7cf;--tm-cycle-card:#ffffff;--tm-cycle-card-border:rgba(148, 163, 184, 0.20);--tm-cycle-shadow:0 14px 34px rgba(31, 42, 36, 0.10);--tm-cycle-radius:8px;--tm-focus-left:#2fbf73;--tm-focus-right:#1f2c3b;--tm-focus-cone-left:#e9f5ee;--tm-focus-cone-right:#edf0f2;--tm-focus-ink:#1f2a24;--tm-focus-muted:#6b7280;--tm-focus-axis:#cfd2d6;--tm-network-primary:#2fbf73;--tm-network-dark:#1f2c3b;--tm-network-line:#cad7cf;--tm-network-ink:#1f2a24;--tm-network-glow:rgba(36, 194, 83, 0.26);--tm-ribbon-primary:#2fbf73;--tm-ribbon-dark:#1f2c3b;--tm-ribbon-soft:#e9f5ee;--tm-ribbon-line:#cad7cf;--tm-ribbon-ink:#1f2a24;--tm-ribbon-muted:#7a8b81;--tm-ribbon-shadow:0 14px 34px rgba(31, 42, 36, 0.10);--tm-triad-primary:#2fbf73;--tm-triad-dark:#1f2c3b;--tm-triad-soft:#e9f5ee;--tm-triad-line:#cad7cf;--tm-triad-ink:#1f2a24;">
<svg class="tm-canvas" viewBox="0 0 1920 1080" aria-hidden="true">
  <defs>
    <filter id="tm-hub-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="var(--tm-network-glow)" flood-opacity="1"></feDropShadow>
    </filter>
    <linearGradient id="tm-hub-flow-left" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="var(--tm-network-primary)" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="var(--tm-network-primary)" stop-opacity="0.92"></stop>
    </linearGradient>
    <linearGradient id="tm-hub-flow-right" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="var(--tm-network-primary)" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="var(--tm-network-primary)" stop-opacity="0.92"></stop>
    </linearGradient>
  </defs>
  <ellipse class="tm-hub-outer-loop" cx="960" cy="540" rx="720" ry="430"></ellipse>
  <ellipse class="tm-hub-inner-loop" cx="960" cy="540" rx="330" ry="300"></ellipse>
  <ellipse class="tm-hub-target-loop" cx="1735" cy="540" rx="170" ry="170"></ellipse>
  <line class="tm-hub-spoke" x1="960" y1="540" x2="700" y2="345"></line>
  <line class="tm-hub-spoke" x1="960" y1="540" x2="1220" y2="345"></line>
  <line class="tm-hub-spoke" x1="960" y1="540" x2="700" y2="775"></line>
  <line class="tm-hub-spoke" x1="960" y1="540" x2="1220" y2="775"></line>
  <path class="tm-hub-flow left" d="M 468 520 L 512 520 L 512 498 L 554 540 L 512 582 L 512 560 L 468 560 Z"></path>
  <path class="tm-hub-flow right" d="M 1365 520 L 1410 520 L 1410 498 L 1452 540 L 1410 582 L 1410 560 L 1365 560 Z"></path>
  <polygon class="tm-hub-loop-arrow top outer" points="960,90 980,110 960,130"></polygon>
  <polygon class="tm-hub-loop-arrow top inner" points="960,220 980,240 960,260"></polygon>
  <polygon class="tm-hub-loop-arrow bottom inner" points="960,860 940,840 960,820"></polygon>
  <polygon class="tm-hub-loop-arrow bottom outer" points="960,990 940,970 960,950"></polygon>
</svg>
<div class="tm-hub-source" data-lg-component="GraphicNode" data-lg-node-id="source">
  <span data-lg-text-role="起点节点" data-lg-max-chars="10">发起源</span>
</div>
<div class="tm-hub-center" data-lg-component="GraphicNode" data-lg-node-id="hub" data-lg-emphasis="true">
  <strong data-lg-text-role="中心标题" data-lg-max-chars="8">核心</strong>
  <span data-lg-text-role="中心副标题" data-lg-max-chars="16">Service</span>
</div>
<div class="tm-hub-orbit-node" data-lg-component="GraphicNode" data-lg-node-id="orbit-1" style="left:622px;top:265px;">
    <span data-lg-text-role="轨道节点" data-lg-max-chars="4">用</span>
  </div><div class="tm-hub-orbit-node" data-lg-component="GraphicNode" data-lg-node-id="orbit-2" style="left:1118px;top:265px;">
    <span data-lg-text-role="轨道节点" data-lg-max-chars="4">想</span>
  </div><div class="tm-hub-orbit-node" data-lg-component="GraphicNode" data-lg-node-id="orbit-3" style="left:622px;top:695px;">
    <span data-lg-text-role="轨道节点" data-lg-max-chars="4">拼</span>
  </div><div class="tm-hub-orbit-node" data-lg-component="GraphicNode" data-lg-node-id="orbit-4" style="left:1118px;top:695px;">
    <span data-lg-text-role="轨道节点" data-lg-max-chars="4">比</span>
  </div>
<div class="tm-hub-target" data-lg-component="GraphicNode" data-lg-node-id="target-1" style="left:1555px;top:310px;width:160px;height:160px;">
    <span data-lg-text-role="结果节点" data-lg-max-chars="10">参与者A</span>
  </div><div class="tm-hub-target" data-lg-component="GraphicNode" data-lg-node-id="target-2" style="left:1755px;top:440px;width:160px;height:160px;">
    <span data-lg-text-role="结果节点" data-lg-max-chars="10">参与者B</span>
  </div><div class="tm-hub-target" data-lg-component="GraphicNode" data-lg-node-id="target-3" style="left:1570px;top:615px;width:160px;height:160px;">
    <span data-lg-text-role="结果节点" data-lg-max-chars="10">参与者C</span>
  </div>
<div class="tm-hub-label top" data-lg-component="GraphicLabel" data-lg-text-role="上方关系标签" data-lg-max-chars="10">价值度</div>
<div class="tm-hub-label left" data-lg-component="GraphicLabel" data-lg-text-role="左侧关系标签" data-lg-max-chars="10">品质感</div>
<div class="tm-hub-label right" data-lg-component="GraphicLabel" data-lg-text-role="右侧关系标签" data-lg-max-chars="10">效益比</div>
<div class="tm-hub-label bottom" data-lg-component="GraphicLabel" data-lg-text-role="下方关系标签" data-lg-max-chars="10">信任感</div>
<div class="tm-hub-label outer-top" data-lg-component="GraphicLabel" data-lg-text-role="外层上标签" data-lg-max-chars="10">品牌传递</div>
<div class="tm-hub-label outer-bottom" data-lg-component="GraphicLabel" data-lg-text-role="外层下标签" data-lg-max-chars="10">价值认同</div>
</div>
</section>
<footer class="tm-footer" data-lg-zone="footer"></footer>
</main>
</body>
</html>

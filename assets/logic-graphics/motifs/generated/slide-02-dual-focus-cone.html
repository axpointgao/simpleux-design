<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1">
<title>Template Motif</title>
<link rel="stylesheet" href="../template-motifs.css">
</head>
<body>
<main class="tm-page" data-logic-graphic="true" data-lg-component="GraphicFrame" data-lg-token-version="logic-graphics-v1" data-template-motif="dual-focus-cone">
<header class="tm-caption" data-lg-zone="header"></header>
<section class="tm-main" data-lg-zone="main">

<div class="tm-dual-focus" data-template-style="takram" style="--tm-cycle-accent:#2fbf73;--tm-cycle-accent-dark:#16a34a;--tm-cycle-accent-soft:#e9f5ee;--tm-cycle-ink:#1f2a24;--tm-cycle-muted:#7a8b81;--tm-cycle-ring:#cad7cf;--tm-cycle-card:#ffffff;--tm-cycle-card-border:rgba(148, 163, 184, 0.20);--tm-cycle-shadow:0 14px 34px rgba(31, 42, 36, 0.10);--tm-cycle-radius:8px;--tm-focus-left:#2fbf73;--tm-focus-right:#1f2c3b;--tm-focus-cone-left:#e9f5ee;--tm-focus-cone-right:#edf0f2;--tm-focus-ink:#1f2a24;--tm-focus-muted:#6b7280;--tm-focus-axis:#cfd2d6;--tm-network-primary:#2fbf73;--tm-network-dark:#1f2c3b;--tm-network-line:#cad7cf;--tm-network-ink:#1f2a24;--tm-network-glow:rgba(36, 194, 83, 0.26);--tm-ribbon-primary:#2fbf73;--tm-ribbon-dark:#1f2c3b;--tm-ribbon-soft:#e9f5ee;--tm-ribbon-line:#cad7cf;--tm-ribbon-ink:#1f2a24;--tm-ribbon-muted:#7a8b81;--tm-ribbon-shadow:0 14px 34px rgba(31, 42, 36, 0.10);--tm-triad-primary:#2fbf73;--tm-triad-dark:#1f2c3b;--tm-triad-soft:#e9f5ee;--tm-triad-line:#cad7cf;--tm-triad-ink:#1f2a24;--tm-layered-primary:#2fbf73;--tm-layered-dark:#1f2c3b;--tm-layered-soft:#e9f5ee;--tm-layered-line:#cad7cf;--tm-layered-ink:#1f2a24;--tm-layered-muted:#7a8b81;--tm-bilateral-primary:#2fbf73;--tm-bilateral-dark:#1f2c3b;--tm-bilateral-soft:#e9f5ee;--tm-bilateral-line:#cad7cf;--tm-bilateral-ink:#1f2a24;--tm-bilateral-muted:#7a8b81;">
<svg class="tm-canvas" viewBox="0 0 1920 1080" aria-hidden="true">
  <defs>
    <linearGradient id="tm-focus-left-fade" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="var(--tm-focus-cone-left)" stop-opacity="0"></stop>
      <stop offset="46%" stop-color="var(--tm-focus-cone-left)" stop-opacity="0.82"></stop>
      <stop offset="100%" stop-color="var(--tm-focus-cone-left)" stop-opacity="0.96"></stop>
    </linearGradient>
    <linearGradient id="tm-focus-right-fade" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="var(--tm-focus-cone-right)" stop-opacity="0"></stop>
      <stop offset="48%" stop-color="var(--tm-focus-cone-right)" stop-opacity="0.80"></stop>
      <stop offset="100%" stop-color="var(--tm-focus-cone-right)" stop-opacity="0.96"></stop>
    </linearGradient>
  </defs>
  <path class="tm-dual-focus-cone left" d="M 58 64 L 642 500 L 58 1016 Z"></path>
  <path class="tm-dual-focus-cone right" d="M 1862 64 L 1278 500 L 1862 1016 Z"></path>
  <line class="tm-dual-focus-axis" x1="960" y1="368" x2="960" y2="446"></line>
  <polygon class="tm-dual-focus-axis-arrow" points="960,474 947,450 973,450"></polygon>
  <line class="tm-dual-focus-axis" x1="960" y1="600" x2="960" y2="676"></line>
  <polygon class="tm-dual-focus-axis-arrow" points="960,704 947,680 973,680"></polygon>
</svg>
<div class="tm-dual-focus-circle left" data-lg-component="GraphicNode" data-lg-node-id="left-focus">
  <strong data-lg-text-role="左焦点标题" data-lg-max-chars="8">视觉</strong>
  <span data-lg-text-role="左焦点副标题" data-lg-max-chars="16">Vision</span>
</div>
<div class="tm-dual-focus-circle right" data-lg-component="GraphicNode" data-lg-node-id="right-focus">
  <strong data-lg-text-role="右焦点标题" data-lg-max-chars="8">交互</strong>
  <span data-lg-text-role="右焦点副标题" data-lg-max-chars="16">Interaction</span>
</div>
<div class="tm-dual-focus-point left" data-lg-component="GraphicLabel" data-lg-text-role="左侧要点" data-lg-max-chars="18" style="left:92px;top:338px;">满足用户视觉偏好</div><div class="tm-dual-focus-point left" data-lg-component="GraphicLabel" data-lg-text-role="左侧要点" data-lg-max-chars="18" style="left:92px;top:466px;">满足产品体验统一性</div><div class="tm-dual-focus-point left" data-lg-component="GraphicLabel" data-lg-text-role="左侧要点" data-lg-max-chars="18" style="left:92px;top:594px;">实现商业上的成功</div>
<div class="tm-dual-focus-point right" data-lg-component="GraphicLabel" data-lg-text-role="右侧要点" data-lg-max-chars="18" style="left:1505px;top:338px;">交互反馈一致性</div><div class="tm-dual-focus-point right" data-lg-component="GraphicLabel" data-lg-text-role="右侧要点" data-lg-max-chars="18" style="left:1505px;top:466px;">保持简洁的流畅性</div><div class="tm-dual-focus-point right" data-lg-component="GraphicLabel" data-lg-text-role="右侧要点" data-lg-max-chars="18" style="left:1505px;top:594px;">玩法简单无需思考</div>
<div class="tm-dual-axis-label top" data-lg-component="GraphicLabel" data-lg-text-role="轴顶部标签" data-lg-max-chars="8">业务侧</div>
<div class="tm-dual-axis-label middle" data-lg-component="GraphicLabel" data-lg-text-role="轴中部标签" data-lg-max-chars="8">客户侧</div>
<div class="tm-dual-axis-label bottom" data-lg-component="GraphicLabel" data-lg-text-role="轴底部标签" data-lg-max-chars="8">用户侧</div>
</div>
</section>
<footer class="tm-footer" data-lg-zone="footer"></footer>
</main>
</body>
</html>

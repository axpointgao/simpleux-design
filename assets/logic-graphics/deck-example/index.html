<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Deck · Logic Graphics Example</title>
<script>
  window.DECK_MANIFEST = [
    { file: "slides/01-logic-graphic.html", label: "逻辑图形组件页" }
  ];
  window.DECK_WIDTH = 1920;
  window.DECK_HEIGHT = 1080;
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0a0a0a;
    overflow: hidden;
    font-family: -apple-system, "PingFang SC", sans-serif;
  }
  #stage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform-origin: top left;
    background: #fff;
    box-shadow: 0 10px 60px rgba(0,0,0,0.4);
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #fff;
  }
  .counter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    z-index: 100;
  }
</style>
</head>
<body>
<div id="stage">
  <iframe id="frame" src="about:blank"></iframe>
</div>
<div class="counter" id="counter">1 / 1</div>
<script>
(function () {
  const W = window.DECK_WIDTH || 1920;
  const H = window.DECK_HEIGHT || 1080;
  const deck = window.DECK_MANIFEST || [];
  const stage = document.getElementById("stage");
  const frame = document.getElementById("frame");
  const counter = document.getElementById("counter");
  let current = 0;

  stage.style.width = W + "px";
  stage.style.height = H + "px";

  function fit() {
    const s = Math.min(window.innerWidth / W, window.innerHeight / H);
    const x = (window.innerWidth - W * s) / 2;
    const y = (window.innerHeight - H * s) / 2;
    stage.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
    stage.style.top = "0";
    stage.style.left = "0";
  }

  function show(index) {
    if (!deck[index]) return;
    current = index;
    frame.src = deck[index].file;
    counter.textContent = `${index + 1} / ${deck.length}`;
  }

  window.addEventListener("resize", fit);
  document.addEventListener("keydown", (event) => {
    if (event.key === "ArrowRight") show(Math.min(current + 1, deck.length - 1));
    if (event.key === "ArrowLeft") show(Math.max(current - 1, 0));
  });

  fit();
  show(0);
})();
</script>
</body>
</html>

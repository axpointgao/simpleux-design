<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>SimpleUX 固定封底页</title>
<style>
  * {
    box-sizing: border-box;
  }

  html,
  body {
    height: 100%;
  }

  body {
    overflow: hidden;
    margin: 0;
    background: #050505;
    color: #fff;
    font-family: var(--font-sans, Inter, Arial, "PingFang SC", sans-serif);
  }

  #stage {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 1920px;
    height: 1080px;
    transform-origin: top left;
    will-change: transform;
    background: #050505;
  }

  .back-cover {
    position: relative;
    width: 100%;
    height: 100%;
    padding: 86px 98px 0;
    overflow: hidden;
  }

  .thanks {
    margin: 0 0 0 -36px;
    font-size: 194px;
    line-height: 0.9;
    font-weight: 850;
    letter-spacing: 0;
    color: #62e181;
  }

  .tagline {
    margin: 30px 0 0;
    padding-left: 4px;
    width: 1160px;
    font-size: 28px;
    line-height: 1.2;
    font-weight: 560;
    color: rgba(255, 255, 255, 0.82);
    white-space: nowrap;
  }

  .closing-info {
    position: absolute;
    left: 98px;
    right: 98px;
    bottom: 184px;
    display: grid;
    grid-template-columns: 560px 1fr;
    column-gap: 120px;
    align-items: start;
  }

  .contact {
    display: grid;
    gap: 30px;
    padding-left: 4px;
  }

  .contact-block {
    min-width: 0;
  }

  .contact-label,
  .address-label {
    margin: 0 0 16px;
    font-size: 16px;
    line-height: 1;
    color: rgba(255, 255, 255, 0.9);
    font-weight: 650;
  }

  .contact-value {
    margin: 0;
    font-size: 27px;
    line-height: 1.32;
    font-weight: 800;
    letter-spacing: 0.01em;
    color: rgba(255, 255, 255, 0.92);
  }

  .phone-line {
    white-space: nowrap;
  }

  .phone-area {
    display: inline-block;
    width: 76px;
  }

  .phone-number {
    display: inline-block;
  }

  .contact-note {
    font-size: 16px;
    font-weight: 700;
    margin-left: 10px;
  }

  .website {
    display: inline-block;
    color: inherit;
    text-decoration: none;
    border-bottom: 2px solid currentColor;
    padding-bottom: 1px;
  }

  .address-area {
    min-width: 0;
  }

  .addresses {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    column-gap: 86px;
    row-gap: 68px;
    width: 100%;
  }

  .city h2 {
    margin: 0 0 22px;
    color: #62e181;
    font-size: 28px;
    line-height: 1;
    font-weight: 500;
    letter-spacing: 0;
  }

  .city p {
    margin: 0;
    font-size: 17px;
    line-height: 1.58;
    font-weight: 560;
    color: rgba(255, 255, 255, 0.82);
  }

  .city p span {
    display: block;
    white-space: nowrap;
  }

  .brand-motion {
    position: absolute;
    right: 0;
    top: 28px;
    width: 760px;
    height: 500px;
    object-fit: contain;
  }

  .brand-strip {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 78px;
    background: #62e181;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 66px;
  }

  .brand-strip img {
    width: 282px;
    max-height: 36px;
    height: auto;
    display: block;
  }

  .brand-strip p {
    margin: 0;
    font-size: 20px;
    font-weight: 650;
    letter-spacing: 0.02em;
    color: #050505;
  }
</style>
</head>
<body>
  <div id="stage">
    <main class="back-cover">
      <h1 class="thanks">Thanks</h1>
      <p class="tagline">简立方，一家专注于数字策略与数字产品的体验设计公司</p>

      <video class="brand-motion" autoplay muted loop playsinline></video>

      <section class="closing-info">
        <div class="contact" aria-label="SimpleUX contact information">
          <div class="contact-block">
            <p class="contact-label">专线:</p>
            <p class="contact-value">180 5716 5136</p>
          </div>
          <div class="contact-block">
            <p class="contact-label">固定电话:</p>
            <p class="contact-value phone-line"><span class="phone-area">0571-</span><span class="phone-number">8882 6850</span><span class="contact-note">（杭州）</span></p>
            <p class="contact-value phone-line"><span class="phone-area">028-</span><span class="phone-number">8416 6771</span><span class="contact-note">（成都）</span></p>
          </div>
          <div class="contact-block">
            <p class="contact-label">公司官网</p>
            <a class="contact-value website" href="https://www.simpleux.cn">www.simpleux.cn</a>
          </div>
        </div>

        <div class="address-area" aria-label="SimpleUX company addresses">
          <p class="address-label">公司地址:</p>
          <section class="addresses">
            <div class="city"><h2>成都（总部）</h2><p><span>成都市高新区</span><span>新裕路501博雅城市广场C座1111</span></p></div>
            <div class="city"><h2>杭州</h2><p><span>杭州市拱墅区</span><span>祥园路108号中国智慧信息产业园A座7楼</span></p></div>
            <div class="city"><h2>北京</h2><p><span>北京市朝阳区</span><span>阜通东大街方恒国际C座805</span></p></div>
            <div class="city"><h2>上海</h2><p><span>上海市长宁区</span><span>淮海西路666号中山万博国际中心25层</span></p></div>
            <div class="city"><h2>深圳</h2><p><span>深圳市福田区</span><span>星河世纪大厦A栋3503室</span></p></div>
          </section>
        </div>
      </section>

      <footer class="brand-strip">
        <img alt="全速集团 / 简立方" />
        <p>全速集团旗下用户体验设计品牌</p>
      </footer>
    </main>
  </div>
  <script>
    function fitBackCover() {
      const stage = document.getElementById("stage");
      const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      const x = (window.innerWidth - 1920 * scale) / 2;
      const y = (window.innerHeight - 1080 * scale) / 2;
      stage.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
      stage.style.top = "0";
      stage.style.left = "0";
    }

    window.addEventListener("resize", fitBackCover);
    function ensureMediaAsset(selector, attrName, projectPath, previewPath) {
      const target = document.querySelector(selector);
      if (!target) return;
      if (target.getAttribute(attrName)) return;

      const isTemplatePreview = window.location.pathname.includes("/assets/deck-templates/");
      target.setAttribute(attrName, isTemplatePreview ? previewPath : projectPath);
    }

    ensureMediaAsset(".brand-motion", "src", "../shared/publisher/SimpleUX.mp4", "../publisher/SimpleUX.mp4");
    ensureMediaAsset(".brand-strip img", "src", "../shared/publisher/FullSpeed&SimpleUX.png", "../publisher/FullSpeed&SimpleUX.png");

    window.addEventListener("keydown", (event) => {
      if (window.parent === window) return;

      const commandByKey = {
        ArrowRight: "next",
        " ": "next",
        PageDown: "next",
        ArrowLeft: "prev",
        PageUp: "prev",
        Home: "home",
        End: "end",
        p: "print",
        P: "print"
      };
      const command = commandByKey[event.key];
      if (!command) return;

      event.preventDefault();
      window.parent.postMessage({ type: "simpleux-deck-command", command }, "*");
    });
    fitBackCover();
  </script>
</body>
</html>
